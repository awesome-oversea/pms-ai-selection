name: minimal-ci

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: minimal-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  lint-type:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

  trusted-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Compile source
        run: python -m compileall src

      - name: Run trusted baseline tests
        run: |
          pytest tests/test_api_integration.py tests/test_minimal_trusted_phase34.py tests/test_bff_contracts.py tests/test_report_center_service.py tests/test_frontend_workbench_files.py -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Frontend smoke
        run: npm run smoke
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install chromium
        working-directory: frontend

      - name: Frontend e2e smoke
        run: npm run e2e:smoke
        working-directory: frontend

      - name: Build frontend evidence manifest
        if: always()
        run: npm run evidence:manifest
        working-directory: frontend

      - name: Upload frontend e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            artifacts/frontend
          if-no-files-found: warn

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  security-smoke:
    runs-on: ubuntu-latest
    needs: [lint-type]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Security Smoke
        run: python scripts/release_quality_gates.py security-smoke

      - name: Upload security gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-gate-record
          path: artifacts/release/latest_gate_check.json
          if-no-files-found: warn

  docker-build:
    runs-on: ubuntu-latest
    needs: [trusted-baseline, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        run: docker build -t pms:${{ github.sha }} .

      - name: Export image metadata
        run: |
          mkdir -p artifacts/release
          docker image inspect pms:${{ github.sha }} > artifacts/release/docker-image-metadata.json

      - name: Upload image metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-image-metadata
          path: artifacts/release/docker-image-metadata.json
          if-no-files-found: warn

  release-gates:
    runs-on: ubuntu-latest
    needs: [trusted-baseline, frontend-build, security-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate Gateway Config
        run: python scripts/validate_gateway_config.py

      - name: Gateway Smoke Check
        run: python scripts/gateway_smoke_check.py

      - name: ERP Smoke Baseline
        run: python scripts/erp_smoke_test.py

      - name: Observability Smoke Baseline
        run: python scripts/observability_smoke_check.py

      - name: Release Quality Gates
        run: python scripts/release_quality_gates.py all

      - name: Upload release gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-record
          path: artifacts/release/latest_gate_check.json
          if-no-files-found: warn

  staging-deploy:
    runs-on: ubuntu-latest
    needs: [release-gates, docker-build]
    if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download release gate artifact
        uses: actions/download-artifact@v4
        with:
          name: release-gate-record
          path: artifacts/release

      - name: Download image metadata
        uses: actions/download-artifact@v4
        with:
          name: release-image-metadata
          path: artifacts/release

      - name: Record staging deployment
        run: python scripts/release_deploy.py --target staging --version ${{ github.sha }}

      - name: Upload staging release artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-release-record
          path: artifacts/release/latest_release.json
          if-no-files-found: warn
