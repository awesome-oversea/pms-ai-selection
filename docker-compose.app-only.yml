services:
  pms-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PMS_PYTHON_EXTRAS: ${PMS_DOCKER_PYTHON_EXTRAS:-local-ai}
    image: ${PMS_APP_IMAGE:-pms-app:local}
    container_name: pms-app
    ports:
      - "${APP_HOST_PORT:-18000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-pms-ai-selection}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_API_PREFIX: ${APP_API_PREFIX:-/api/v1}
      DB_URL: ${DB_URL}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      SEC_SECRET_KEY: ${SEC_SECRET_KEY}
      LLM_PRIMARY_MODEL: ${LLM_PRIMARY_MODEL:-qwen2.5:1.5b-instruct}
      LLM_OLLAMA_ENDPOINT: ${DOCKER_APP_LLM_OLLAMA_ENDPOINT:-http://ollama-shared:11434}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-bge-large-zh}
      DIFY_ENABLED: ${DIFY_ENABLED:-false}
      SEARCH_ENABLED: ${SEARCH_ENABLED:-false}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-opensearch}
      SEARCH_ENDPOINT: ${SEARCH_ENDPOINT:-http://opensearch-shared:9200}
      NEO4J_ENABLED: ${NEO4J_ENABLED:-false}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j-shared:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change_me_neo4j}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant-shared}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      REPORT_CENTER_STATE_PATH: ${REPORT_CENTER_STATE_PATH:-/app/artifacts/report_center/shared-runtime.json}
    volumes:
      - ${PMS_CACHE_ROOT:-/data/aitools/fms/cache}:/app/.cache
      - ${PMS_ARTIFACTS_ROOT:-/data/aitools/fms/artifacts}:/app/artifacts
    restart: unless-stopped

networks:
  default:
    external: true
    name: shared-runtime-network
