routes:
  - name: pms-internal-route
    service: pms-internal-service
    paths:
      - /api/v1/internal
      - /api/v1/selection
      - /api/v1/knowledge
      - /api/v1/agents
      - /api/v1/llm
      - /api/v1/system
    strip_path: false
    methods: [GET, POST, PUT, DELETE]
  - name: pms-bff-route
    service: pms-bff-service
    paths:
      - /api/v1/bff
    strip_path: false
    methods: [GET, POST, DELETE]
  - name: pms-openapi-route
    service: pms-openapi-service
    paths:
      - /openapi
      - /docs
      - /redoc
    strip_path: false
    methods: [GET]
