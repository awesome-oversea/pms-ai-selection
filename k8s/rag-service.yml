apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-rag-service
  namespace: pms-system
  labels:
    app.kubernetes.io/name: pms
    app.kubernetes.io/component: rag-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pms
      app.kubernetes.io/component: rag-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pms
        app.kubernetes.io/component: rag-service
    spec:
      containers:
        - name: rag-service
          image: ${REGISTRY}/pms-rag-service:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "uvicorn", "src.apps.rag_service:app", "--host", "0.0.0.0", "--port", "8101"]
          ports:
            - containerPort: 8101
              name: http
          env:
            - name: APP_ENVIRONMENT
              value: production
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: pms-rag-service
  namespace: pms-system
spec:
  selector:
    app.kubernetes.io/name: pms
    app.kubernetes.io/component: rag-service
  ports:
    - name: http
      port: 8101
      targetPort: http
