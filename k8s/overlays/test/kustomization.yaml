apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../deployment.yml
  - ../../postgresql.yml
  - ../../redis.yml
  - ../../rag-service.yml
  - ../../llm-service.yml
  - ../../gateway/kong.yml
namePrefix: test-
commonLabels:
  env: test
patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/env
        value: test
