apiVersion: v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: pms-system
  labels:
    app.kubernetes.io/name: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-device-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-device-plugin
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s/device-plugin:v0.14.3
          args:
            - --fail-on-init-error=false
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: pod-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
            type: Directory
      nodeSelector:
        gpu-type: "a100"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pms-gpu-quota
  namespace: pms-system
spec:
  hard:
    requests.nvidia.com/gpu: "12"
    limits.nvidia.com/gpu: "12"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: pms-gpu-high-priority
value: 1000000
globalDefault: false
description: "GPU推理任务高优先级"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-vllm-inference
  namespace: agent
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: llm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      nodeSelector:
        pool: llm
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm-server
          image: vllm/vllm-openai:latest
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "3"
            requests:
              cpu: "4000m"
              memory: "32Gi"
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen2.5-72B-Instruct"
            - name: MAX_MODEL_LEN
              value: "8192"
            - name: GPU_MEMORY_UTILIZATION
              value: "0.9"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
