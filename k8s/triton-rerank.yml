apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-rerank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton-rerank
  template:
    metadata:
      labels:
        app: triton-rerank
    spec:
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:23.10-py3
          args:
            - tritonserver
            - --model-repository=/models
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: 8002
              name: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: triton-rerank
spec:
  selector:
    app: triton-rerank
  ports:
    - name: http
      port: 8000
      targetPort: 8000
