apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: pms-system
data:
  redis.conf: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    tcp-keepalive 300
    timeout 0
  sentinel.conf: |
    sentinel monitor mymaster pms-redis-master-svc 6379 2
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 60000
    sentinel parallel-syncs mymaster 1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pms-redis-master
  namespace: pms-system
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/role: master
spec:
  serviceName: pms-redis-master-svc
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/role: master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/role: master
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - /etc/redis/redis.conf
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
              readOnly: true
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
            items:
              - key: redis.conf
                path: redis.conf
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-ssd
        resources:
          requests:
            storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pms-redis-slave
  namespace: pms-system
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/role: slave
spec:
  serviceName: pms-redis-slave-svc
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/role: slave
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/role: slave
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --slaveof
            - pms-redis-master-svc
            - "6379"
            - /etc/redis/redis.conf
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
            items:
              - key: redis.conf
                path: redis.conf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-redis-sentinel
  namespace: pms-system
  labels:
    app.kubernetes.io/name: redis-sentinel
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-sentinel
    spec:
      containers:
        - name: sentinel
          image: redis:7-alpine
          command:
            - redis-sentinel
            - /etc/redis/sentinel.conf
          ports:
            - name: sentinel
              containerPort: 26379
          volumeMounts:
            - name: sentinel-config
              mountPath: /etc/redis
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      volumes:
        - name: sentinel-config
          configMap:
            name: redis-config
            items:
              - key: sentinel.conf
                path: sentinel.conf
---
apiVersion: v1
kind: Service
metadata:
  name: pms-redis-master-svc
  namespace: pms-system
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/role: master
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/role: master
---
apiVersion: v1
kind: Service
metadata:
  name: pms-redis-slave-svc
  namespace: pms-system
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/role: slave
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/role: slave
---
apiVersion: v1
kind: Service
metadata:
  name: pms-redis-sentinel-svc
  namespace: pms-system
  labels:
    app.kubernetes.io/name: redis-sentinel
spec:
  type: ClusterIP
  ports:
    - port: 26379
      targetPort: sentinel
  selector:
    app.kubernetes.io/name: redis-sentinel
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pms-redis-pdb
  namespace: pms-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-sentinel
