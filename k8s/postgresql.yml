apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-primary-config
  namespace: pms-system
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 300
    shared_buffers = 256MB
    effective_cache_size = 768MB
    maintenance_work_mem = 64MB
    work_mem = 4MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    wal_level = replica
    max_wal_senders = 3
    hot_standby = on
    hot_standby_feedback = on
    wal_keep_segments = 64
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-credentials
  namespace: pms-system
type: Opaque
stringData:
  POSTGRES_USER: "pms"
  POSTGRES_PASSWORD: "pms_prod_2024_secure"
  POSTGRES_DB: "pms_db"
  REPLICATION_PASSWORD: "pms_repl_2024_secure"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pms-pg-primary
  namespace: pms-system
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/role: primary
spec:
  serviceName: pms-pg-primary-svc
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/role: primary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/role: primary
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: pg-credentials
            - configMapRef:
                name: pg-primary-config
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
            - name: pg-config
              mountPath: /etc/postgresql/conf.d
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - pms
                - -d
                - pms_db
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - pms
                - -d
                - pms_db
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pg-config
          configMap:
            name: pg-primary-config
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-ssd
        resources:
          requests:
            storage: 100Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pms-pg-replica
  namespace: pms-system
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/role: replica
spec:
  serviceName: pms-pg-replica-svc
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/role: replica
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/role: replica
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: pg-credentials
          env:
            - name: PGUSER
              value: "pms"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-credentials
                  key: REPLICATION_PASSWORD
          command:
            - bash
            - -c
            - |
              until pg_isready -h pms-pg-primary-svc -p 5432; do sleep 2; done
              rm -rf /var/lib/postgresql/data/*
              pg_basebackup -h pms-pg-primary-svc -D /var/lib/postgresql/data -U pms -Fp -Xs -P -R
              echo "hot_standby = on" >> /var/lib/postgresql/data/postgresql.auto.conf
              echo "primary_conninfo = 'host=pms-pg-primary-svc port=5432 user=pms'" >> /var/lib/postgresql.data/postgresql.auto.conf
              exec postgres
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-ssd
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pms-pg-primary-svc
  namespace: pms-system
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/role: primary
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/role: primary
---
apiVersion: v1
kind: Service
metadata:
  name: pms-pg-replica-svc
  namespace: pms-system
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/role: replica
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/role: replica
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-pgbouncer
  namespace: pms-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.22-alpine
          ports:
            - containerPort: 6432
          env:
            - name: DATABASES_DEFAULT
              value: "host=pms-pg-primary-svc port=5432 dbname=pms_db user=pms"
            - name: POOL_MODE
              value: "transaction"
            - name: MAX_CLIENT_CONN
              value: "200"
            - name: DEFAULT_POOL_SIZE
              value: "20"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
