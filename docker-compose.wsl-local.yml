services:
  kong-gateway:
    image: kong:3.8
    container_name: pms-kong-local
    environment:
      KONG_DATABASE: "off"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
    ports:
      - "8000:8000"
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./k8s/gateway/kong.yml:/opt/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 8

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: pms-opensearch-wsl-local
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "19200:9200"
      - "19600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26-community
    container_name: pms-neo4j-local
    environment:
      NEO4J_AUTH: neo4j/pms_graph_dev
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_server_jvm_additional: -XX:+ExitOnOutOfMemoryError
    ports:
      - "17474:7474"
      - "17687:7687"
    volumes:
      - neo4j_data:/data
      - ./artifacts/runtime/neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | /var/lib/neo4j/bin/cypher-shell -a bolt://127.0.0.1:7687 -u neo4j -p pms_graph_dev --non-interactive >/dev/null 2>&1"]
      interval: 15s
      timeout: 20s
      start_period: 60s
      retries: 20

volumes:
  opensearch_data:
  neo4j_data:

networks:
  default:
    name: pms-network
