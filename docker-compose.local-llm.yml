services:
  ollama:
    image: ollama/ollama
    container_name: pms-ollama-local
    ports:
      - "11434:11434"
    volumes:
      - ${LOCAL_OLLAMA_DATA_DIR:-D:/aitools/fms/ollama}:/root/.ollama
    networks:
      pms-network:
        aliases:
          - ollama
          - pms-ollama-local
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  cpu-model-cache-init:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PMS_PYTHON_EXTRAS: ${PMS_DOCKER_PYTHON_EXTRAS:-local-ai}
    command:
      - python
      - -m
      - src.bootstrap_local_model_assets
    environment:
      HF_HOME: ${HF_HOME:-/app/.cache/huggingface}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/app/.cache/huggingface}
      SENTENCE_TRANSFORMERS_HOME: ${SENTENCE_TRANSFORMERS_HOME:-/app/.cache/sentence-transformers}
      WHISPER_CACHE_DIR: ${WHISPER_CACHE_DIR:-/app/.cache/whisper}
    volumes:
      - ${LOCAL_MODEL_CACHE_DIR:-D:/aitools/fms/model-cache}:/app/.cache
    restart: "no"

networks:
  pms-network:
    external: true
    name: pms-network
